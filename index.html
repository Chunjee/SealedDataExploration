
<!DOCTYPE html>
<html data-theme="dark">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Chunjee's Supply/Demand Tracker</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script src="https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js"></script>
	<style>
		:root {
			--pico-font-family: system-ui, -apple-system, "Segoe UI", "Roboto", "Ubuntu", "Cantarell", "Noto Sans", sans-serif;
		}
		
		body {
			padding: 2rem 1rem;
		}
		
		.container {
			max-width: 2400px;
		}
		
		.chart-container {
			margin-bottom: 2rem;
		}
		
		canvas {
			max-height: 400px;
		}
		
		.positive {
			color: var(--pico-ins-color);
			font-weight: 600;
		}
		
		.negative {
			color: var(--pico-del-color);
			font-weight: 600;
		}
		
		.neutral {
			color: var(--pico-muted-color);
		}
		
		.velocity-high {
			color: #e74c3c;
			font-weight: 600;
		}
		
		.velocity-med {
			color: #f39c12;
			font-weight: 600;
		}
		
		.velocity-low {
			color: #95a5a6;
		}
		
		.filter-grid {
			display: grid;
			grid-template-columns: 1fr 2fr auto;
			gap: 1rem;
			align-items: end;
		}
		
		.hint {
			font-size: 0.875rem;
			color: var(--pico-muted-color);
			margin-top: 0.25rem;
		}
		
		table {
			margin-top: 1rem;
		}
		
		th {
			font-weight: 600;
		}
		
		@media (max-width: 768px) {
			.filter-grid {
				grid-template-columns: 1fr;
			}
		}
		
		[data-theme="dark"] .positive {
			color: #2ecc71;
		}
		
		[data-theme="dark"] .negative {
			color: #e74c3c;
		}
	</style>
</head>
<body>
	<main class="container">
		<hgroup>
			<h1>Chunjee's Supply/Demand Tracker</h1>
			<p>Track and compare sets on one page</p>
		</hgroup>
		<article>
			<header>
				<strong>Filter Items</strong>
			</header>
			<label>
				Item Name
				<input type="text" id="filterInput" placeholder="Type to filter items (ex: 'BoosterBox', 'Bundle', 'Ascended', ...)">
			</label>
			<label>
				<input type="checkbox" id="showLegend">
				Show Legends
			</label>
		</article>
		
		<article>
			<header>
				<strong>Performance Comparison</strong>
			</header>
			<div class="filter-grid">
				<label>
					Compare Date
					<input type="text" id="compareDate" placeholder="YYYY-MM-DD" value="2025-07-07">
					<small class="hint">Available: 2025-07-07 to 2026-07-17</small>
				</label>
				<label>
					Item Names (comma-separated)
					<input type="text" id="compareItems" placeholder="ex: Bundle, ETB, BoosterBox">
					<small class="hint">Leave empty to compare all items</small>
				</label>
				<button onclick="calculatePerformance()">Calculate</button>
			</div>
			<div id="performanceTable"></div>
		</article>
		
		<article class="chart-container">
			<header>
				<strong>Market Price Over Time</strong>
			</header>
			<canvas id="priceChart"></canvas>
		</article>
		
		<article class="chart-container">
			<header>
				<strong>Available Quantity Over Time</strong>
			</header>
			<canvas id="quantityChart"></canvas>
		</article>
		
		<article class="chart-container">
			<header>
				<strong>Sales Velocity</strong>
				<p style="font-size: 0.875rem; color: var(--pico-muted-color); margin-top: 0.5rem;">
					Higher = selling faster.
				</p>
			</header>
			<canvas id="velocityChart"></canvas>
		</article>
		
		<article class="chart-container">
			<header>
				<strong>Pricing Pressure</strong>
				<p style="font-size: 0.875rem; color: var(--pico-muted-color); margin-top: 0.5rem;">
					Higher = listings above market price. Lower = listing near market price
				</p>
			</header>
			<canvas id="pricingPressureChart"></canvas>
		</article>
		
		<footer>
			<small>
				<button class="outline secondary" onclick="toggleTheme()" style="width: auto;">
					Toggle Dark/Light Mode
				</button>
			</small>
		</footer>
	</main>

			a = parseFloat(a.replace(/ days/g, ''));
			b = parseFloat(b.replace(/ days/g, ''));
			return a - b;
		});
		
		// Performance comparison
		function calculatePerformance() {
			const compareDateInput = document.getElementById('compareDate').value.trim();
			const compareItemsInput = document.getElementById('compareItems').value.trim();
			const performanceTableDiv = document.getElementById('performanceTable');
			
			if (!compareDateInput) {
				performanceTableDiv.innerHTML = '<p><mark>Please enter a comparison date.</mark></p>';
				return;
			}
			
			const compareDate = findNearestDate(compareDateInput);
			if (!compareDate) {
				performanceTableDiv.innerHTML = `<p><mark>Invalid date format. Please use YYYY-MM-DD.</mark></p>`;
				return;
			}
			
			const itemFilters = compareItemsInput 
				? compareItemsInput.split(',').map(s => s.trim().toLowerCase())
				: [];
			
			const latestDate = dates[dates.length - 1];
			const compareDateIndex = dates.indexOf(compareDate);
			const latestDateIndex = dates.length - 1;
			
			const results = [];
			
			chartData.forEach(item => {
				if (itemFilters.length > 0) {
					const itemLower = item.label.toLowerCase();
					const matches = itemFilters.some(filter => itemLower.includes(filter));
					if (!matches) return;
				}
				
				const oldPrice = item.prices[compareDateIndex];
				const newPrice = item.prices[latestDateIndex];
				const daysUntilStockout = item.days_until_stockout[latestDateIndex];
				const pricingPressure = item.pricing_pressure[latestDateIndex];
				
				if (oldPrice !== null && newPrice !== null) {
					const change = newPrice - oldPrice;
					const changePercent = ((change / oldPrice) * 100).toFixed(1);
					
					results.push({
						label: item.label,
						oldPrice: oldPrice,
						newPrice: newPrice,
						change: change,
						changePercent: changePercent,
						daysUntilStockout: daysUntilStockout,
						pricingPressure: pricingPressure
					});
				}
			});
			
			results.sort((a, b) => Math.abs(b.changePercent) - Math.abs(a.changePercent));
			
			if (results.length === 0) {
				performanceTableDiv.innerHTML = '<p><mark>No matching items found.</mark></p>';
				return;
			}
			
			let tableHTML = `
				<figure>
					<table id="comparisonTable" role="grid">
						<thead>
							<tr>
								<th>Item</th>
								<th>Price on ${compareDate}</th>
								<th>Price on ${latestDate}</th>
								<th>Change ($)</th>
								<th>Change (%)</th>
								<th>Days Until Stockout</th>
								<th>Pricing Pressure</th>
							</tr>
						</thead>
						<tbody>
			`;
			
			results.forEach(result => {
				const changeClass = result.change > 0 ? 'positive' : result.change < 0 ? 'negative' : 'neutral';
				const changeSign = result.change > 0 ? '+' : '';
				
				// Days until stockout styling
				let daysClass = 'velocity-low';
				let daysDisplay = 'N/A';
				if (result.daysUntilStockout !== null && result.daysUntilStockout !== undefined) {
					daysDisplay = result.daysUntilStockout.toFixed(1) + ' days';
					if (result.daysUntilStockout <= 7) {
						daysClass = 'velocity-high';
					} else if (result.daysUntilStockout <= 30) {
						daysClass = 'velocity-med';
					}
				}
				
				// Pricing pressure styling
				let pressureClass = 'neutral';
				let pressureDisplay = 'N/A';
				if (result.pricingPressure !== null && result.pricingPressure !== undefined) {
					const pressureSign = result.pricingPressure > 0 ? '+' : '';
					pressureDisplay = pressureSign + result.pricingPressure.toFixed(2) + '%';
					if (result.pricingPressure < -5) {
						pressureClass = 'negative';
					} else if (result.pricingPressure > 10) {
						pressureClass = 'positive';
					}
				}
				
				tableHTML += `
					<tr>
						<td>${result.label}</td>
						<td>$${result.oldPrice.toFixed(2)}</td>
						<td>$${result.newPrice.toFixed(2)}</td>
						<td class="${changeClass}">${changeSign}$${Math.round(result.change)}</td>
						<td class="${changeClass}">${changeSign}${result.changePercent}%</td>
						<td class="${daysClass}">${daysDisplay}</td>
						<td class="${pressureClass}">${pressureDisplay}</td>
					</tr>
				`;
			});
			
			tableHTML += '</tbody></table></figure>';
			performanceTableDiv.innerHTML = tableHTML;
			new Tablesort(document.getElementById('comparisonTable'));
		}
	</script>
