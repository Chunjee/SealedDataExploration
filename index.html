<html data-theme="dark">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Chunjee's Supply/Demand Tracker</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script src="https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js"></script>
	<style>
		:root {
			--pico-font-family: system-ui, -apple-system, "Segoe UI", "Roboto", "Ubuntu", "Cantarell", "Noto Sans", sans-serif;
		}
		
		body {
			padding: 2rem 1rem;
		}
		
		.container {
			max-width: 2400px;
		}
		
		.chart-container {
			margin-bottom: 2rem;
		}
		
		canvas {
			max-height: 400px;
		}
		
		.positive {
			color: var(--pico-ins-color);
			font-weight: 600;
		}
		
		.negative {
			color: var(--pico-del-color);
			font-weight: 600;
		}
		
		.neutral {
			color: var(--pico-muted-color);
		}
		
		.filter-grid {
			display: grid;
			grid-template-columns: 1fr 2fr auto;
			gap: 1rem;
			align-items: end;
		}
		
		.hint {
			font-size: 0.875rem;
			color: var(--pico-muted-color);
			margin-top: 0.25rem;
		}
		
		table {
			margin-top: 1rem;
		}
		
		th {
			font-weight: 600;
		}
		
		@media (max-width: 768px) {
			.filter-grid {
				grid-template-columns: 1fr;
			}
		}
		
		/* Theme toggle */
		[data-theme="dark"] .positive {
			color: #2ecc71;
		}
		
		[data-theme="dark"] .negative {
			color: #e74c3c;
		}
	</style>
</head>
<body>
	<main class="container">
		<hgroup>
			<h1>Chunjee's Supply/Demand Tracker</h1>
			<p>Track and compare sets on one page</p>
		</hgroup>
		
		<article>
			<header>
				<strong>Filter Items</strong>
			</header>
			<label>
				Item Name
				<input type="text" id="filterInput" placeholder="Type to filter items (ex: 'BoosterBox', 'Bundle', 'Ascended', ...)">
			</label>
		</article>
		
		<article>
			<header>
				<strong>Performance Comparison</strong>
			</header>
			<div class="filter-grid">
				<label>
					Compare Date
					<input type="text" id="compareDate" placeholder="YYYY-MM-DD" value="2025-07-07">
					<small class="hint">Available: 2025-07-07 to 2026-07-04</small>
				</label>
				<label>
					Item Names (comma-separated)
					<input type="text" id="compareItems" placeholder="ex: Bundle, ETB, BoosterBox">
					<small class="hint">Leave empty to compare all items</small>
				</label>
				<button onclick="calculatePerformance()">Calculate</button>
			</div>
			<div id="performanceTable"></div>
		</article>
		
		<article class="chart-container">
			<header>
				<strong>Market Price Over Time</strong>
			</header>
			<canvas id="priceChart"></canvas>
		</article>
		
		<article class="chart-container">
			<header>
				<strong>Available Quantity Over Time</strong>
			</header>
			<canvas id="quantityChart"></canvas>
		</article>
		
		<footer>
			<small>
				<button class="outline secondary" onclick="toggleTheme()" style="width: auto;">
					Toggle Dark/Light Mode
				</button>
			</small>
		</footer>
	</main>

		uniqueSets.forEach((set, index) => {

		// Get color based on set and item type
		function getColor(setName, itemName) {
			const baseHue = setBaseColors[setName] || 0;
			let lightness = 50; // Default
			let saturation = 70;
			
			// Determine lightness based on item type
			const itemLower = itemName.toLowerCase();
			if (itemLower.includes('bundle')) {
				lightness = 65; // Lightest
			} else if (itemLower.includes('etb') || itemLower.includes('elite trainer')) {
				lightness = 50; // Medium
			} else if (itemLower.includes('boosterbox') || itemLower.includes('booster box')) {
				lightness = 35; // Darkest
			}
			
			return `hsl(${baseHue}, ${saturation}%, ${lightness}%)`;
		}
		
		// Convert HSL to hex for transparency
		function hslToRgba(hsl, alpha) {
			const result = hsl.match(/\d+/g);
			const h = parseInt(result[0]);
			const s = parseInt(result[1]) / 100;
			const l = parseInt(result[2]) / 100;
			
			const c = (1 - Math.abs(2 * l - 1)) * s;
			const x = c * (1 - Math.abs((h / 60) % 2 - 1));
			const m = l - c / 2;
			
			let r = 0, g = 0, b = 0;
			if (h < 60) { r = c; g = x; b = 0; }
			else if (h < 120) { r = x; g = c; b = 0; }
			else if (h < 180) { r = 0; g = c; b = x; }
			else if (h < 240) { r = 0; g = x; b = c; }
			else if (h < 300) { r = x; g = 0; b = c; }
			else { r = c; g = 0; b = x; }
			
			r = Math.round((r + m) * 255);
			g = Math.round((g + m) * 255);
			b = Math.round((b + m) * 255);
			
			return `rgba(${r}, ${g}, ${b}, ${alpha})`;
		}

		// Find nearest date in dataset
		function findNearestDate(inputDate) {
			const input = new Date(inputDate);
			if (isNaN(input)) return null;
			
			let nearest = dates[0];
			let minDiff = Math.abs(new Date(dates[0]) - input);
			
			dates.forEach(date => {
				const diff = Math.abs(new Date(date) - input);
				if (diff < minDiff) {
					minDiff = diff;
					nearest = date;
				}
			});
			
			return nearest;
		}

		Tablesort.extend('currency', function(item) {

		b = parseFloat(b.replace(/[+\$]/g, ''));
		return a - b;

		b = parseFloat(b.replace(/[+%]/g, ''));

		// Performance comparison
		function calculatePerformance() {
			const compareDateInput = document.getElementById('compareDate').value.trim();
			const compareItemsInput = document.getElementById('compareItems').value.trim();
			const performanceTableDiv = document.getElementById('performanceTable');
			
			// Validate date

			// Find nearest date

			if (!compareDate) {

			// Parse item filters

			// Get latest date
			const latestDate = dates[dates.length - 1];
			const compareDateIndex = dates.indexOf(compareDate);

			const results = [];
			
			chartData.forEach(item => {

					const itemLower = item.label.toLowerCase();
					const matches = itemFilters.some(filter => itemLower.includes(filter));

				const oldPrice = item.prices[compareDateIndex];
				const newPrice = item.prices[latestDateIndex];

					const change = newPrice - oldPrice;

					const changePercent = ((change / oldPrice) * 100).toFixed(1);
					
					results.push({

						oldPrice: oldPrice,
						newPrice: newPrice,
						change: change,
						changePercent: changePercent
					});
				}
			});
			
			// Sort by absolute change percent (biggest movers first)
			results.sort((a, b) => Math.abs(b.changePercent) - Math.abs(a.changePercent));
			
			// Generate table
			if (results.length === 0) {
				performanceTableDiv.innerHTML = '<p><mark>No matching items found.</mark></p>';

			let tableHTML = `

								<th>Change ($)</th>

							</tr>
						</thead>
						<tbody>
			`;
			
			results.forEach(result => {
				const changeClass = result.change > 0 ? 'positive' : result.change < 0 ? 'negative' : 'neutral';

						<td class="${changeClass}">${changeSign}${result.changePercent}%</td>
					</tr>
				`;
			});
			
			tableHTML += '</tbody></table></figure>';
			performanceTableDiv.innerHTML = tableHTML;
